<!DOCTYPE html>
<html>

<head>

<title>Attendance Management System</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body class="container mt-4">

<h1 class="text-center mb-4">Attendance Management System</h1>

<div class="card p-3 mb-4">

<h4>Add Attendance</h4>

<div class="row g-2">

<div class="col-md-3">
<input type="text" class="form-control" id="studentName" placeholder="Student Name">
</div>

<div class="col-md-2">
<input type="text" class="form-control" id="rollNumber" placeholder="Roll Number">
</div>

<div class="col-md-2">
<input type="text" class="form-control" id="courseName" placeholder="Course Name">
</div>

<div class="col-md-2">
<input type="date" class="form-control" id="attendanceDate">
</div>

<div class="col-md-2">
<select class="form-control" id="status">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
</select>
</div>

<div class="col-md-1">
<button class="btn btn-primary w-100" onclick="addAttendance()">Add</button>
</div>

</div>

</div>


<div class="card p-3 mb-3">

<div class="row g-2">

<div class="col-md-4">
<input type="text" class="form-control" id="searchBox" placeholder="Search by Student Name">
</div>

<div class="col-md-2">
<button class="btn btn-success w-100" onclick="searchAttendance()">Search</button>
</div>

<div class="col-md-3">
<select class="form-control" id="filterStatus" onchange="filterStatus()">
<option value="">Filter by Status</option>
<option value="Present">Present</option>
<option value="Absent">Absent</option>
</select>
</div>

</div>

</div>


<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Name</th>
<th>Roll</th>
<th>Course</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="attendanceTable">

</tbody>

</table>

<script src="script.js"></script>

</body>
</html>
